2.0.0:
    - 'Major release: Code refactoring, performance improvements, security fixes'
    - 'Added reusable post card partials for components'
    - 'Added settings caching for better performance'
    - 'Optimized comment query to reduce database cloning'
    - 'Replaced $_SERVER with Request class for security'
    - 'Added time interval constants in Comment model'
    - 'Removed deprecated getRenderContentAttribute method'
    - 'Added database indexes for all major tables'
2.0.1:
    - 'Fixed minor bugs in components'
2.0.2:
    - 'Bug fixes and performance improvements in comment handling'
    - 'Code cleanup and optimization in all components'
2.0.3:
    - 'Security improvements: Enhanced IP detection with X-Forwarded-For and Cloudflare support'
    - 'Security: Added queue-based async view counting to prevent blocking'
    - 'Security: Added Cloudflare HTTP_CF_CONNECTING_IP header support'
    - 'Code quality: Fixed array_filter callbacks to use arrow functions instead of strings'
    - 'Code quality: Added proper return types to all methods'
    - 'Code quality: Replaced dynamic method calls with explicit match expressions'
    - 'Code quality: Added logging to empty catch blocks'
    - 'Performance: Created RecordViewJob for async view counting via queue'
    - 'Performance: View tracking no longer blocks page requests'
2.0.4:
    - 'Fix foreign key constraint errors when rolling back database migrations'
    - 'Fix: Added dropForeign calls before dropIndex in v1.0.8 and v1.0.9 down() methods'
    - v2.0.4/fix_foreign_key_constraints.php

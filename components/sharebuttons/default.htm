{% set counts = __SELF__.shareCounts() %}
{% set postId = __SELF__.resolvePostId() %}

<div class="rounded-2xl border border-gray-200/70 dark:border-gray-700/60 bg-white/80 dark:bg-gray-800/70 shadow-sm px-6 py-8">

    <!-- Header -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 shadow-lg mb-3">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
        </div>
        <h2 class="text-xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 dark:from-gray-100 dark:to-gray-300 bg-clip-text text-transparent">
            Share this post
        </h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            Let others discover this content
        </p>
    </div>

    <!-- Buttons -->
    <div class="flex flex-wrap justify-center gap-3" id="share-buttons">

        <!-- Facebook -->
        <button type="button"
            class="share-btn group relative flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold text-white hover:scale-105 active:scale-95"
            data-platform="facebook"
            style="background: linear-gradient(135deg, #1877F2 0%, #0C63D4 100%); box-shadow: 0 4px 15px rgba(24, 119, 242, 0.3);">
            <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 rounded-full"></div>
            <span class="relative z-10 flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M13.135 6H15V3h-1.865a4.147 4.147 0 0 0-4.142 4.142V9H7v3h2v9.938h3V12h2.021l.592-3H12V6.591A.6.6 0 0 1 12.592 6h.543Z" clip-rule="evenodd"/>
                </svg>
                <span class="inline-block">Facebook</span>
            </span>
        </button>

        <!-- Twitter -->
        <button type="button"
            class="share-btn group relative flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold text-white hover:scale-105 active:scale-95"
            data-platform="twitter"
            style="background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);">
            <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 rounded-full"></div>
            <span class="relative z-10 flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M13.795 10.533 20.68 2h-3.073l-5.255 6.517L7.69 2H1l7.806 10.91L1.47 22h3.074l5.705-7.07L15.31 22H22l-8.205-11.467Zm-2.38 2.95L9.97 11.464 4.36 3.627h2.31l4.528 6.317 1.443 2.02 6.018 8.409h-2.31l-4.934-6.89Z"/>
                </svg>
                <span class="inline-block">X</span>
            </span>
        </button>

        <!-- LinkedIn -->
        <button type="button"
            class="share-btn group relative flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold text-white hover:scale-105 active:scale-95"
            data-platform="linkedin"
            style="background: linear-gradient(135deg, #0A66C2 0%, #0A5CAD 100%); box-shadow: 0 4px 15px rgba(10, 102, 194, 0.3);">
            <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 rounded-full"></div>
            <span class="relative z-10 flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M12.51 8.796v1.697a3.738 3.738 0 0 1 3.288-1.684c3.455 0 4.202 2.16 4.202 4.97V19.5h-3.2v-5.072c0-1.21-.244-2.766-2.128-2.766-1.827 0-2.139 1.317-2.139 2.676V19.5h-3.19V8.796h3.168ZM7.2 6.106a1.61 1.61 0 0 1-.988 1.483 1.595 1.595 0 0 1-1.743-.348A1.607 1.607 0 0 1 5.6 4.5a1.601 1.601 0 0 1 1.6 1.606Z" clip-rule="evenodd"/>
                    <path d="M7.2 8.809H4V19.5h3.2V8.809Z"/>
                </svg>
                <span class="inline-block">LinkedIn</span>
            </span>
        </button>

        <!-- WhatsApp -->
        <button type="button"
            class="share-btn group relative flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold text-white hover:scale-105 active:scale-95"
            data-platform="whatsapp"
            style="background: linear-gradient(135deg, #25D366 0%, #20BD5A 100%); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);">
            <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 rounded-full"></div>
            <span class="relative z-10 flex items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M12 4a8 8 0 0 0-6.895 12.06l.569.718-.697 2.359 2.32-.648.379.243A8 8 0 1 0 12 4ZM2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10a9.96 9.96 0 0 1-5.016-1.347l-4.948 1.382 1.426-4.829-.006-.007-.033-.055A9.958 9.958 0 0 1 2 12Z" clip-rule="evenodd"/>
                    <path d="M16.735 13.492c-.038-.018-1.497-.736-1.756-.83a1.008 1.008 0 0 0-.34-.075c-.196 0-.362.098-.49.291-.146.217-.587.732-.723.886-.018.02-.042.045-.057.045-.013 0-.239-.093-.307-.123-1.564-.68-2.751-2.313-2.914-2.589-.023-.04-.024-.057-.024-.057.005-.021.058-.074.085-.101.08-.079.166-.182.249-.283l.117-.14c.121-.14.175-.25.237-.375l.033-.066a.68.68 0 0 0-.02-.64c-.034-.069-.65-1.555-.715-1.711-.158-.377-.366-.552-.655-.552-.027 0 0 0-.112.005-.137.005-.883.104-1.213.311-.35.22-.94.924-.94 2.16 0 1.112.705 2.162 1.008 2.561l.041.06c1.161 1.695 2.608 2.951 4.074 3.537 1.412.564 2.081.63 2.461.63.16 0 .288-.013.4-.024l.072-.007c.488-.043 1.56-.599 1.804-1.276.192-.534.243-1.117.115-1.329-.088-.144-.239-.216-.43-.308Z"/>
                </svg>
                <span class="inline-block">WhatsApp</span>
            </span>
        </button>

        <!-- Copy Link -->
        <button type="button"
            id="copy-link-btn"
            class="group relative flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-semibold text-gray-700 dark:text-gray-200 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 hover:scale-105 active:scale-95 border border-gray-200 dark:border-gray-700">
            <div class="absolute inset-0 bg-gradient-to-r from-purple-500 to-pink-500 opacity-0 group-hover:opacity-10 rounded-full"></div>
            <span class="relative z-10 flex items-center gap-2">
                <svg class="w-5 h-5 group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.213 9.787a3.391 3.391 0 0 0-4.795 0l-3.425 3.426a3.39 3.39 0 0 0 4.795 4.794l.321-.304m-.321-4.49a3.39 3.39 0 0 0 4.795 0l3.424-3.426a3.39 3.39 0 0 0-4.794-4.795l-1.028.961"/>
                </svg>
                <span class="inline-block">Copy Link</span>
            </span>
        </button>
    </div>

    <!-- Footer -->
    <div class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-800">
            <svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            <span>Total Shares:</span>
            <span id="total-share-count" class="font-bold text-purple-600 dark:text-purple-400 text-lg">
                {{ counts['total'] }}
            </span>
        </div>
    </div>
</div>

<script>
    window.POST_ID = {{ postId }};
</script>

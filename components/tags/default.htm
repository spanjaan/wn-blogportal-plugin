{% if __SELF__.tags|length > 0 %}
    <ul class="flex flex-wrap gap-2">
        {% for tag in tags %}
            {% set postCount = tag.post_count %}
            <li>
                <a href="{{ tag.url }}" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-gray-700 dark:text-gray-200 bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200">
                    {{ tag.title | default(tag.slug | title) }}
                    {% if postCount %}
                        <span class="inline-flex items-center justify-center px-2 py-0.5 text-xs font-semibold text-white bg-gray-500 dark:bg-gray-600 rounded-full">{{ postCount }}</span>
                    {% endif %}
                </a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p class="text-gray-500 dark:text-gray-400 italic">No tags were found.</p>
{% endif %}

{% set posts = __SELF__.posts %}

<div class="relative">

    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-fuchsia-600 rounded-2xl flex items-center justify-center shadow-xl shadow-violet-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657L8.464 12.05a4.981 4.981 0 010-6.758l9.193-6.607a4.985 4.985 0 016.935 0l9.193 6.607a4.985 4.985 0 010 6.758l-9.193 6.607a4.985 4.985 0 01-6.935 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.464 12.05a4.981 4.981 0 000-6.758L8.464 1.293"/>
                    </svg>
                </div>
                <div class="absolute -top-1 -right-1 w-4 h-4 bg-fuchsia-500 rounded-full border-2 border-white dark:border-zinc-900"></div>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-zinc-900 dark:text-white">Popular Posts</h2>
                <p class="text-sm text-zinc-500 dark:text-zinc-400">Most viewed articles this month</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 list-none p-0 m-0">
        {% for post in posts %}
            {% partial '@_post-card.htm' post=post %}
        {% else %}
            {% partial '@_empty-state.htm' noPostsMessage=__SELF__.noPostsMessage %}
        {% endfor %}
    </div>

    <div class="mt-8">
        {% partial '@_pagination.htm' %}
    </div>
</div>

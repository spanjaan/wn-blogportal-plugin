{% set posts = __SELF__.posts %}

<div class="relative">
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-8 bg-gradient-to-b from-violet-500 to-fuchsia-500 rounded-full"></div>
            <h2 class="text-xl font-semibold text-zinc-900 dark:text-white">{{ __SELF__.property('title') ?: 'Posts by Date' }}</h2>
        </div>
        <div class="hidden lg:block w-32 h-px bg-gradient-to-r from-purple-500/30 to-transparent"></div>
    </div>

    <ul class="grid grid-cols-1 lg:grid-cols-3 gap-6 list-none p-0 m-0">
        {% for post in posts %}
            {% partial '@partials/_post-card.htm' post=post %}
        {% else %}
            {% partial '@partials/_empty-state.htm' noPostsMessage=__SELF__.noPostsMessage %}
        {% endfor %}
    </ul>
</div>

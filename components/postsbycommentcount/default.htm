{% set posts = __SELF__.posts %}

<div class="relative">

    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-12 h-12 bg-gradient-to-br from-amber-500 to-orange-600 rounded-2xl flex items-center justify-center shadow-xl shadow-amber-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                </div>
                <div class="absolute -top-1 -right-1 w-4 h-4 bg-amber-500 rounded-full border-2 border-white dark:border-zinc-900"></div>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-zinc-900 dark:text-white">Most Discussed</h2>
                <p class="text-sm text-zinc-500 dark:text-zinc-400">Posts with most comments</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 list-none p-0 m-0">
        {% for post in posts %}
            {% partial '@_post-card.htm' post=post %}
        {% else %}
            {% partial '@_empty-state.htm' noPostsMessage=__SELF__.noPostsMessage %}
        {% endfor %}
    </div>

    <div class="mt-8">
        {% partial '@_pagination.htm' %}
    </div>
</div>

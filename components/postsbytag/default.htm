{% set posts = __SELF__.posts %}

<div class="relative">

    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center shadow-xl shadow-emerald-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                    </svg>
                </div>
                <div class="absolute -top-1 -right-1 w-4 h-4 bg-emerald-500 rounded-full border-2 border-white dark:border-zinc-900"></div>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-zinc-900 dark:text-white">{{ __SELF__.tag.title }}</h2>
                <p class="text-sm text-zinc-500 dark:text-zinc-400">{{ posts.total | default(0) }} articles</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 list-none p-0 m-0">
        {% for post in posts %}
            {% partial '@_post-card.htm' post=post %}
        {% else %}
            {% partial '@_empty-state.htm' noPostsMessage=__SELF__.noPostsMessage %}
        {% endfor %}
    </div>

    <div class="mt-8">
        {% partial '@_pagination.htm' %}
    </div>
</div>
